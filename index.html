<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Reading Guided Study — BibleProject</title>
<link rel="icon" href="bibleproject-logo-mark.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bp-blue:#2a9fd6;--bp-blue-dark:#1e8abb;--bp-cream:#f5f3ee;--bp-black:#1a1a1a;--bp-gray:#6b6b6b;--bp-border:#e0ddd8}
html{scroll-behavior:smooth}
body{background:var(--bp-cream);color:var(--bp-black);font-family:'Inter',sans-serif;font-weight:400;line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.home-wrap{max-width:420px;width:100%;text-align:center}
.home-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:28px;text-decoration:none;color:inherit}
.home-logo img{height:32px;width:auto;display:block}
.home-title{font-size:1.25rem;font-weight:600;margin-bottom:8px}
.home-sub{font-size:.9rem;color:var(--bp-gray);margin-bottom:28px;line-height:1.55}
.home-actions{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
.home-btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 28px;background:var(--bp-blue);color:#fff;text-decoration:none;border-radius:10px;font-size:.9rem;font-weight:500;transition:background .15s;min-width:220px}
.home-btn:hover{background:var(--bp-blue-dark)}
.home-btn-secondary{background:var(--bp-white);color:var(--bp-black);border:0.5px solid var(--bp-border)}
.home-btn-secondary:hover{background:var(--bp-cream);border-color:var(--bp-blue)}
</style>
</head>
<body>
  <main class="home-wrap">
    <a class="home-logo" href="https://p-crawf.github.io/BPSandbox" aria-label="BibleProject — home">
      <img src="bibleproject-logo-mark.svg" alt="" width="48" height="48" decoding="async" aria-hidden="true">
      <img src="bibleproject-word-mark.svg" alt="BibleProject" width="148" height="27" decoding="async">
    </a>
    <h1 class="home-title">Bible Reading Guided Study</h1>
    <p class="home-sub">Open the communal Bible study tool to select a passage and work through each step.</p>
    <div class="home-actions">
      <a class="home-btn" href="Bible-Reading-Guided-Study/">Start the study</a>
      <a class="home-btn home-btn-secondary" href="tier-2/">Tier 2</a>
    </div>
  </main>
</body>
</html>
